<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Payouts — Windy Drops</title>
<link rel="stylesheet" href="/styles.css">
<style>
  .shell { max-width: 720px; margin: 0 auto; padding: 64px 24px; }
  .shell h1 { font-size: 32px; margin-bottom: 16px; }
  .shell p { color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
  .stripe-cta { display: inline-block; padding: 12px 24px; background: #635bff; color: white; border-radius: 8px; text-decoration: none; cursor: pointer; border: 0; font: inherit; font-weight: 600; }
  .stripe-cta:disabled { opacity: .5; cursor: wait; }
  .note { font-size: 13px; opacity: .7; margin-top: 16px; }
  .status-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 24px; margin: 24px 0; }
  .status-card.connected { border-color: #38d39f; }
  .signin-shell { text-align: center; padding: 96px 24px; }
  .signin-shell .cta { display:inline-block; padding:12px 24px; background:var(--accent); color:white; border-radius:8px; text-decoration:none; }
</style>
</head>
<body>
<div id="root"></div>
<script src="/auth.js"></script>
<script>
const root = document.getElementById("root");

function renderSignIn() {
  root.innerHTML = '<div class="signin-shell"><h1>Creator Payouts</h1><p>Sign in to connect Stripe.</p><a class="cta" href="#" onclick="WindyAuth.signIn(\'/me/payouts\'); return false;">Sign in →</a></div>';
}

async function loadStatus() {
  try {
    const s = await WindyAuth.get('/api/v1/me/stripe/status', { auth: true });
    if (s.connected) {
      root.innerHTML = '<div class="shell"><h1>Creator Payouts</h1>' +
        '<div class="status-card connected">' +
          '<strong>✓ Connected to Stripe</strong>' +
          '<p style="margin:8px 0;">Account: <code>' + s.account_id + '</code></p>' +
          '<p style="margin:0;">Charges enabled: ' + (s.charges_enabled ? 'yes' : 'no') + ' · Payouts enabled: ' + (s.payouts_enabled ? 'yes' : 'no') + '</p>' +
        '</div>' +
        '<p>Tips received on your drops go straight to this Stripe account. <a href="https://dashboard.stripe.com" style="color:var(--accent);">Open Stripe dashboard →</a></p>' +
        '<p class="note">Per ADR-053: 0% platform cut on tips (v1) and on paid drops (v1.1). Refunds + 1099s come through your Stripe dashboard.</p>' +
      '</div>';
    } else {
      root.innerHTML = '<div class="shell"><h1>Creator Payouts</h1>' +
        '<p>Connect Stripe to receive tips on your drops. <strong>0% platform cut</strong> — full amount (minus Stripe\'s ~3% processing) goes to you.</p>' +
        '<button id="connect" class="stripe-cta">Connect Stripe →</button>' +
        '<p class="note">Stripe handles KYC, tax forms, bank linkage. Refunds + tax 1099s come through your Stripe dashboard.</p>' +
        '<p class="note">Per ADR-053: tip jars in v1 (0% platform cut). Paid drops + royalty payouts in v1.1 (also 0%).</p>' +
      '</div>';
      document.getElementById('connect').addEventListener('click', async function() {
        const btn = document.getElementById('connect');
        btn.disabled = true;
        btn.textContent = 'Loading…';
        try {
          const r = await WindyAuth.post('/api/v1/me/stripe/connect', null);
          window.location.href = r.oauth_url;
        } catch (e) {
          btn.disabled = false;
          btn.textContent = 'Connect Stripe →';
          alert('Failed to start Stripe Connect: ' + (e.status || 'network'));
        }
      });
    }
  } catch (e) {
    if (e.status === 401) { WindyAuth.setToken(null); renderSignIn(); }
    else root.innerHTML = '<div class="shell"><h1>Creator Payouts</h1><p>Error: ' + (e.status || 'network') + '</p></div>';
  }
}

if (WindyAuth.isSignedIn()) loadStatus();
else renderSignIn();
</script>
</body>
</html>
