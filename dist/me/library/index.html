<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Library — Windy Drops</title>
<link rel="stylesheet" href="/styles.css">
<style>
  .shell { max-width: 1000px; margin: 0 auto; padding: 48px 24px; }
  .shell h1 { font-size: 32px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 20px; color: var(--fg); position: relative; }
  .card:hover { border-color: var(--accent); }
  .card-type { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 8px; }
  .card-name { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .card-meta { color: var(--muted); font-size: 13px; }
  .uninstall { position:absolute; top:12px; right:12px; background:transparent; border:1px solid var(--card-border); color:var(--muted); padding:4px 10px; border-radius:999px; font-size:11px; cursor:pointer; }
  .uninstall:hover { color: #ff6b6b; border-color: #ff6b6b; }
  .empty { padding: 64px; text-align: center; color: var(--muted); }
  .empty a { color: var(--accent); }
  .signin-shell { text-align: center; padding: 96px 24px; }
  .signin-shell h1 { font-size: 28px; margin-bottom: 16px; }
  .signin-shell .cta { display:inline-block; padding:12px 24px; background:var(--accent); color:white; border-radius:8px; text-decoration:none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="/auth.js"></script>
<script>
const root = document.getElementById("root");

function renderSignIn() {
  root.innerHTML = '<div class="signin-shell"><h1>My Library</h1><p>Sign in to see your installed drops.</p><a class="cta" href="#" onclick="WindyAuth.signIn(\'/me/library\'); return false;">Sign in →</a></div>';
}

function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}

async function loadLibrary() {
  try {
    const body = await WindyAuth.get('/api/v1/me/library', { auth: true });
    if (body.total === 0) {
      root.innerHTML = '<div class="shell"><h1>My Library</h1><div class="empty"><p>You haven\'t installed any drops yet.</p><p><a href="/browse">Browse drops →</a></p></div></div>';
      return;
    }
    const rows = body.items.map(function(it) {
      return '<div class="card">' +
        '<button class="uninstall" data-id="' + escape(it.drop_id) + '">Uninstall</button>' +
        '<a href="/d/' + escape(it.drop_id) + '" style="color:inherit;text-decoration:none;">' +
          '<div class="card-name">' + escape(it.drop_id) + '</div>' +
          '<div class="card-meta">v' + escape(it.version) + ' · installed ' + new Date(it.installed_at).toLocaleDateString() + '</div>' +
        '</a>' +
        '</div>';
    }).join("");
    root.innerHTML = '<div class="shell"><h1>My Library (' + body.total + ')</h1><div class="grid">' + rows + '</div></div>';
    document.querySelectorAll('.uninstall').forEach(function(b) {
      b.addEventListener('click', async function(e) {
        e.stopPropagation();
        if (!confirm('Uninstall ' + b.dataset.id + '?')) return;
        try {
          await WindyAuth.post('/api/v1/me/library/uninstall', { drop_id: b.dataset.id });
          loadLibrary();
        } catch (err) { alert('Uninstall failed: ' + (err.status || err)); }
      });
    });
  } catch (e) {
    if (e.status === 401) {
      WindyAuth.setToken(null);
      renderSignIn();
    } else {
      root.innerHTML = '<div class="shell"><h1>My Library</h1><p>Error loading: ' + escape(String(e.status || e)) + '</p></div>';
    }
  }
}

if (WindyAuth.isSignedIn()) loadLibrary();
else renderSignIn();
</script>
</body>
</html>
